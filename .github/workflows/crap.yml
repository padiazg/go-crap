name: crap
on: 
  push:
    branches: [master]
  pull_request:
  pull_request_target:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: '1.26.2'
          cache: true
      - run: go test -race -count=1 ./...
      - run: go build -o go-crap .

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  crap:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: '1.26.2'
      - name: build
        run: make build

      - name: version
        run: ./go-crap version

      - name: score
        run: ./go-crap scan --format github --fail-above --threshold 30 --exclude ".*_test.go" --verbose

      - name: generate pr comment
        run: ./go-crap scan --format pr-comment --threshold 30 --exclude ".*_test.go" --output pr-comment.md

      - name: save pr number
        if: github.event_name == 'pull_request'
        run: echo "${{ github.event.pull_request.number }}" > pr-number.txt

      - name: upload pr comment artifacts
        uses: actions/upload-artifact@v7
        with:
          name: crap-comment
          path: |
            pr-comment.md
            pr-number.txt
          if-no-files-found: ignore
