name: crap
on: 
  push:
    branches-ignore: [master]
  pull_request:

permissions:
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'
          cache: true
      - run: go test ./...
      - run: go build -o go-crap .

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  crap:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'
      - name: build
        run: make build

      - name: version
        run: ./go-crap version

      - name: score
        run: ./go-crap scan --format github --fail-above --threshold 30 --exclude ".*_test.go" --verbose
      
      - name: generate pr comment
        run: ./go-crap scan --format pr-comment --threshold 30 --exclude ".*_test.go" --output pr-comment.md

      - name: save pr number
        run: echo "${{ github.event.pull_request.number }}" > pr-number.txt

      - name: upload pr comment artifacts
        uses: actions/upload-artifact@v4
        with:
          name: crap-comment
          path: |
            pr-comment.md
            pr-number.txt
          if-no-files-found: ignore

      - name: Generate PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { execFileSync } = require('child_process');
            const comment = execFileSync('cat', ['pr-comment.md']).toString();
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
