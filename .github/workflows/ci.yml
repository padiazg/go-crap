name: ci
on: 
  push:
    branches-ignore: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false
      - run: go test ./...
      - run: go build -o go-crap .

  crap:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: make build
      - run: ./go-crap version
      - run: ./go-crap scan --format github --fail-above --threshold 30 --exclude ".*_test.go" --verbose
